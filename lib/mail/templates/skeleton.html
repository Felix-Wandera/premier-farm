<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #334155; margin: 0; padding: 0; background-color: #f8fafc; }
        .wrapper { max-width: 600px; margin: 20px auto; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; background-color: #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .header { background-color: #10b981; padding: 32px 24px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 24px; letter-spacing: -0.02em; }
        .content { padding: 40px 32px; }
        .footer { padding: 24px 32px; background-color: #f1f5f9; border-top: 1px solid #e2e8f0; text-align: center; font-size: 13px; color: #64748b; }
        .button { display: inline-block; padding: 14px 28px; background-color: #10b981; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 24px; }
        .secondary { color: #64748b; font-size: 13px; margin-top: 32px; line-height: 1.5; }
        .plain-link { color: #2563eb; text-decoration: underline; word-break: break-all; font-family: monospace; font-size: 12px; }
        h2 { color: #0f172a; margin-top: 0; font-size: 20px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <h1>Premier Farm</h1>
        </div>
        <div class="content">
            {{content}}
        </div>
        <div class="footer">
            &copy; 2026 Premier Farm Management. All rights reserved.<br>
            Ensuring precision in every harvest.
        </div>
    </div>
</body>
</html>
